name: widgetbook_workspace
description: GenLatte widget catalog / browser.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  data_layer: 0.0.5
  data_layer_hive: ^0.0.2-rc.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_shaders: ^0.1.3
  genlatte:
    path: ../
  genlatte_data:
    path: ../../genlatte-data
  shadcn_flutter: ^0.0.52
  video_player: ^2.11.1
  widgetbook: ^3.20.2
  widgetbook_annotation: ^3.9.0

dev_dependencies:
  build_runner: ^2.10.5
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  widgetbook_generator: ^3.20.1

flutter:
  uses-material-design: true

  assets:
    - assets/firebase-logo.png
    - assets/flutter-logo.png
    - assets/gemini-logo.png
    - assets/latte-background.png

    - assets/videos/Dash_Loading_1080px.webm
    - assets/videos/Dash_Loading_1080px_H.265.mov

  shaders:
    - assets/shaders/squish.glsl
