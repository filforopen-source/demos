name: genlatte
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  flutter: ^3.43.0-0.3.pre
  sdk: ^3.11.0-296.4.beta

dependencies:
  clipboard: ^3.0.14
  cloud_firestore: 6.3.0
  cloud_functions: 6.2.0
  data_layer: 0.0.5
  data_layer_hive: ^0.0.2-rc.1
  equatable: ^2.0.8
  firebase_analytics: ^12.3.0
  firebase_auth: 6.4.0
  firebase_core: 4.7.0
  firebase_remote_config: ^6.4.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_shaders: ^0.1.3
  flutter_svg: ^2.2.4
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  genlatte_data:
    path: ../genlatte-data
  get_it: ^9.2.0
  go_router: ^17.0.1
  google_fonts: ^8.0.0
  hashlib: ^2.3.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  json_annotation: ^4.10.0
  logging: ^1.3.0
  material_symbols_icons: ^4.2928.1
  meta: ^1.17.0
  provider: ^6.1.5+1
  shadcn_flutter: ^0.0.52
  shared_preferences: ^2.5.5
  stream_transform: ^2.1.0
  text_responsive: ^1.2.1
  thanos_snap_effect: ^0.0.9
  uuid: ^4.5.3
  video_player: ^2.11.1
  web_browser_detect: ^2.3.0

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.10.5
  fake_cloud_firestore: 4.1.0+1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.4
  hive_ce_generator: ^1.11.0
  json_serializable: ^6.12.0
  mocktail: ^1.0.4
  network_image_mock: ^2.1.1
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/firebase-logo.png
    - assets/flutter-latte.png
    - assets/flutter-logo.png
    - assets/gemini-logo.png
    - assets/green-check.svg
    - assets/io-primary-gradient-mesh-small.jpg
    - assets/latte-background.png
    - assets/latte-background-thumb.png

    - assets/videos/Dash_Loading_1080px.webm
    - assets/videos/Dash_Loading_1080px_H.265.mov

    # Avatars
    - assets/avatars/asianFemale.png
    - assets/avatars/asianMale.png
    - assets/avatars/blackFemale.png
    - assets/avatars/blackMale.png
    - assets/avatars/caucasianFemale.png
    - assets/avatars/caucasianMale.png
    - assets/avatars/indianFemale.png
    - assets/avatars/indianMale.png
    - assets/avatars/hispanicFemale.png
    - assets/avatars/hispanicMale.png

  shaders:
    - assets/shaders/squish.glsl
    - packages/thanos_snap_effect/shader/thanos_snap_effect.glsl
